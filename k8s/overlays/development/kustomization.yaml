apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitor-deploy-dev

resources:
  - ../../base
  - namespace.yaml

images:
  - name: registry.example.com/monitor-deploy/api
    newTag: development
  - name: registry.example.com/monitor-deploy/vue-app
    newTag: development

patches:
  - path: env-patch.configmap.yaml
    target:
      kind: ConfigMap
      name: env-config
  - path: api-deployment-patch.yaml
    target:
      kind: Deployment
      name: api
  - path: vue-deployment-patch.yaml
    target:
      kind: Deployment
      name: vue-app
